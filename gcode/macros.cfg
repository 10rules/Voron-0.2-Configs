#####################################################################
# Macros
#####################################################################

[gcode_macro PRINT_START]
variable_park_distance_z:        20
variable_purge_distance:        3.5
variable_movement_speed:         50
variable_purge_speed:             5
gcode:
    SET_LED LED="toolhead" RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=1 SYNC=0 TRANSMIT=1
    SET_LED LED="toolhead" RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=1.0 INDEX=2 SYNC=0 TRANSMIT=1
    SET_LED LED="toolhead" RED=0.0 GREEN=0.1 BLUE=0.0 WHITE=0.0 INDEX=3 SYNC=0 TRANSMIT=1
    SET_LED LED="display" RED=0.0 GREEN=0.1 BLUE=0.0 SYNC=0 TRANSMIT=1

    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(0)|float %}
    {% set BED_TEMP = params.BED_TEMP|default(0)|float %}
    {% set PRINTER_MODEL = params.PRINTER_NAME|default("Wrong printer")|string %}

    {% if PRINTER_MODEL != "Voron 0.2" %}
        TURN_OFF_HEATERS
        M107                                 ; turn off fan
        CANCEL_PRINT
        {action_raise_error("Print aborted: Wrong printer model")}
    {% endif %}

    {% if "default" in printer.bed_mesh.profiles %}
        RESPOND MSG="Default bed mesh found. Mesh applied."
        BED_MESH_PROFILE LOAD=default
    {% else %}
        RESPOND MSG="No saved bed mesh found. No mesh applied."
    {% endif %}

    G28                                         ; home all axes
    G90                                         ; absolute positioning   
    M83                                         ; relative extrusion
    G1 Z{park_distance_z} F{movement_speed*60}  ; move nozzle away from bed

    M140 S{BED_TEMP}                            ; Set bed temp
    M190 S{BED_TEMP}                            ; Wait for bed temperature

    M104 S{EXTRUDER_TEMP}                       ; Set extruder temperature
    M109 S{EXTRUDER_TEMP}                       ; Wait for extruder temperature
    
    G1 E{purge_distance} F{purge_speed*60}      ; Compensate for retraction after print end
   
[gcode_macro PRINT_END]
gcode:
    M400                                        ; wait for buffer to clear

    SET_LED LED="toolhead" RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=0.1 SYNC=0 TRANSMIT=1
    SET_LED LED="display" RED=0.0 GREEN=0.0 BLUE=0.0 WHITE=0.1 SYNC=0 TRANSMIT=1
    
    G92 E0                                      ; zero the extruder
    G1 E-4.0 F3600                              ; retract filament
    G91                                         ; relative positioning

    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    #   Check end position to determine safe direction to move
    {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
    {% else %}
        {% set x_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
    {% else %}
        {% set y_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    G0 Z{z_safe} F3600                          ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000               ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                                        ; turn off fan
    G90                                         ; absolute positioning
    G0 X{max_x-10} Y{max_y-10} F3600            ; park nozzle at rear
    M84                                         ; disable all motors
  
[gcode_macro LOAD_FILAMENT]
variable_load_distance:       65
variable_purge_distance:      10
variable_retract_distance:    -4
variable_load_speed:        1500
variable_purge_speed:        300
variable_retract_speed:     3000
gcode:
   SAVE_GCODE_STATE NAME=load_filament
   M83                                         ; set extruder to relative
   G1 E{load_distance} F{load_speed}           ; load
   G1 E{purge_distance} F{purge_speed}         ; prime nozzle with filament
   G1 E{retract_distance} F{retract_speed}     ; retract to prevent oozing
   RESTORE_GCODE_STATE NAME=load_filament

[gcode_macro UNLOAD_FILAMENT]
variable_purge_distance:      10
variable_unload_distance:    -70
variable_purge_speed:          5
variable_unload_speed:        50
gcode:
   SAVE_GCODE_STATE NAME=unload_filament
   M83                                         ; set extruder to relative
   G1 E{purge_distance} F{purge_speed*60}      ; extrude a little to soften tip
   G1 E{unload_distance} F{unload_speed*60}    ; retract some, but not too much or it will jam
   RESTORE_GCODE_STATE NAME=unload_filament

[gcode_macro PURGE_NOZZLE]
variable_purge_distance:     100
variable_retract_distance:    -4
variable_purge_speed:          5
variable_retract_speed:       50
gcode:
  SAVE_GCODE_STATE NAME=purge_nozzle
  M83                                         ; set extruder to relative
  G1 E{purge_distance} F{purge_speed*60}      ; purge old filament
  G1 E{retract_distance} F{retract_speed*60}  ; retract to prevent oozing
  RESTORE_GCODE_STATE NAME=purge_nozzle

[gcode_macro MANUAL_FILAMENT_CHANGE]
gcode:
  SAVE_GCODE_STATE NAME=manual_filament_change
  PAUSE

  M400                                        ; wait for buffer to clear
  G91                                         ; relative positioning

  {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
  {% if printer.toolhead.position.z < (max_z - 20) %}
      {% set z_safe = 20.0 %}
  {% else %}
      {% set z_safe = max_z - printer.toolhead.position.z %}
  {% endif %}

  G0 Z{z_safe} F3600                          ; move nozzle up
  
  UNLOAD_FILAMENT
  RESTORE_GCODE_STATE NAME=manual_filament_change
