[gcode_macro PROBE_ATTACH]
gcode:
  SAVE_GCODE_STATE NAME=probe_attach

  RESPOND MSG="Attaching probe"
  M400
  G4 P{10*1000}
  RESPOND MSG="Probe attached"
  
  RESTORE_GCODE_STATE NAME=probe_attach

[gcode_macro PROBE_DETACH]
gcode:
  SAVE_GCODE_STATE NAME=probe_detach

  RESPOND MSG="Attaching probe"
  M400
  G4 P{10*1000}
  RESPOND MSG="Probe attached"
  
  RESTORE_GCODE_STATE NAME=probe_detach
  